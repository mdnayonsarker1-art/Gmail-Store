<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Gmail Accounts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800">

  <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
      <a href="index.html" class="text-sm bg-blue-700 px-2.5 py-1 rounded-lg hover:bg-blue-800 transition">⬅ Home</a>
      <h1 class="text-base font-bold flex items-center gap-2">👤 My Gmail</h1>
      <div class="flex gap-1">
        <button id="nav-add" class="px-2.5 py-1 bg-blue-700 rounded-lg text-xs font-semibold">Add</button>
        <button id="nav-history" class="px-2.5 py-1 bg-blue-500 rounded-lg text-xs font-semibold">List</button>
      </div>
    </div>
  </nav>

  <main class="max-w-md mx-auto p-4 mb-20">

    <section id="section-add" class="block bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
      <h2 class="text-xl font-bold mb-4 text-slate-800">Add Personal Gmail</h2>
      <form id="gmail-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">Gmail Address <span class="text-red-500">*</span></label>
          <input type="email" id="acc-email" placeholder="example@gmail.com" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">Password <span class="text-red-500">*</span></label>
          <input type="text" id="acc-password" placeholder="Enter Password" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">Recovery Email <span class="text-slate-400 font-normal">(Optional)</span></label>
          <input type="email" id="acc-recovery" placeholder="recovery@example.com" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">Phone Number <span class="text-slate-400 font-normal">(Optional)</span></label>
          <input type="tel" id="acc-phone" placeholder="Enter Phone" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>
        <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl hover:bg-blue-700 transition active:scale-95">Save Account</button>
      </form>
    </section>

    <section id="section-history" class="hidden space-y-4">
      <h2 class="text-xl font-bold text-slate-800 mb-2">My Saved Accounts</h2>
      <input type="text" id="search-bar" placeholder="Search by email..." class="w-full px-4 py-2 rounded-xl border border-slate-200 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <div id="loading-spinner" class="text-center py-8 text-slate-400">Loading accounts...</div>
      <div id="accounts-list" class="space-y-4"></div>
    </section>

  </main>

  <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-full text-sm shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none z-50 min-w-[200px] text-center">Copied!</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCPG0YQeTFcvK9CZdfArh5Yxhl9JJyPWKg",
      authDomain: "ngocom-7a172.firebaseapp.com",
      projectId: "ngocom-7a172",
      storageBucket: "ngocom-7a172.firebasestorage.app",
      messagingSenderId: "150547244077",
      appId: "1:150547244077:web:cf0e2d36317ef5346a04a4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const sectionAdd = document.getElementById('section-add');
    const sectionHistory = document.getElementById('section-history');
    const navAdd = document.getElementById('nav-add');
    const navHistory = document.getElementById('nav-history');
    const gmailForm = document.getElementById('gmail-form');
    const submitBtn = document.getElementById('submit-btn');
    const accountsList = document.getElementById('accounts-list');
    const loadingSpinner = document.getElementById('loading-spinner');
    const searchBar = document.getElementById('search-bar');
    const toast = document.getElementById('toast');

    let allAccounts = [];

    function showToast(msg) {
      toast.innerText = msg;
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      setTimeout(() => { toast.classList.remove('opacity-100'); toast.classList.add('opacity-0'); }, 3000);
    }

    window.copyText = function(text, type) {
      navigator.clipboard.writeText(text).then(() => showToast(`📋 ${type} Copied!`));
    }

    window.deleteAccount = async function(docId) {
      if (confirm("Are you sure you want to delete this?")) {
        try {
          await deleteDoc(doc(db, "my_gmails", docId));
          showToast("🗑️ Account Deleted!");
          loadAccounts();
        } catch (e) { showToast("❌ Failed to Delete!"); }
      }
    }

    navAdd.addEventListener('click', () => {
      sectionAdd.classList.remove('hidden'); sectionHistory.classList.add('hidden');
      navAdd.classList.add('bg-blue-700'); navHistory.classList.remove('bg-blue-700');
    });

    navHistory.addEventListener('click', () => {
      sectionAdd.classList.add('hidden'); sectionHistory.classList.remove('hidden');
      navHistory.classList.add('bg-blue-700'); navAdd.classList.remove('bg-blue-700');
      loadAccounts();
    });

    gmailForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('acc-email').value.trim().toLowerCase();
      const password = document.getElementById('acc-password').value.trim();
      const recovery = document.getElementById('acc-recovery').value.trim() || 'N/A';
      const phone = document.getElementById('acc-phone').value.trim() || 'N/A';

      submitBtn.disabled = true; submitBtn.innerText = "Saving...";

      try {
        const qCheck = query(collection(db, "my_gmails"), where("email", "==", email));
        const querySnapshot = await getDocs(qCheck);
        
        if (!querySnapshot.empty) {
          showToast("⚠️ Already Saved!");
          submitBtn.disabled = false; submitBtn.innerText = "Save Account";
          return;
        }

        await addDoc(collection(db, "my_gmails"), { email, password, recovery, phone, createdAt: new Date() });
        showToast("✅ Saved Successfully!");
        gmailForm.reset();
      } catch (err) { showToast("❌ Error Saving!"); }
      finally { submitBtn.disabled = false; submitBtn.innerText = "Save Account"; }
    });

    async function loadAccounts() {
      loadingSpinner.style.display = 'block'; accountsList.innerHTML = '';
      try {
        const q = query(collection(db, "my_gmails"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        allAccounts = [];
        querySnapshot.forEach((doc) => allAccounts.push({ id: doc.id, ...doc.data() }));
        renderAccounts(allAccounts);
      } catch (err) { accountsList.innerHTML = `<p class="text-red-500 text-center">Error loading history.</p>`; }
      finally { loadingSpinner.style.display = 'none'; }
    }

    function renderAccounts(accounts) {
      accountsList.innerHTML = '';
      if (accounts.length === 0) {
        accountsList.innerHTML = `<p class="text-slate-400 text-center py-6">No accounts found.</p>`;
        return;
      }
      accounts.forEach(acc => {
        const accCard = document.createElement('div');
        accCard.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-3 relative";
        accCard.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <h3 class="text-slate-500 text-xs font-semibold uppercase">Gmail</h3>
              <p class="font-semibold text-slate-800 text-base break-all">${acc.email}</p>
            </div>
            <button onclick="deleteAccount('${acc.id}')" class="text-red-500 hover:bg-red-50 p-2 rounded-xl transition text-xs font-semibold border border-red-100 bg-red-50/30">🗑️ Delete</button>
          </div>
          <div class="space-y-2 bg-slate-50 p-3 rounded-xl text-sm">
            <div class="flex justify-between items-center"><span class="text-slate-500 text-xs font-semibold uppercase">Password</span><span class="font-mono text-slate-700 select-all">${acc.password}</span></div>
            <div class="flex justify-between items-center"><span class="text-slate-500 text-xs font-semibold uppercase">Recovery</span><span class="text-slate-700 text-xs select-all">${acc.recovery}</span></div>
            <div class="flex justify-between items-center"><span class="text-slate-500 text-xs font-semibold uppercase">Phone</span><span class="text-slate-700 text-xs select-all">${acc.phone}</span></div>
          </div>
          <div class="grid grid-cols-2 gap-2 mt-1">
            <button onclick="copyText('${acc.email}', 'Email')" class="bg-blue-50 text-blue-600 font-semibold py-2 px-4 rounded-xl text-xs hover:bg-blue-100 transition">📋 Copy Email</button>
            <button onclick="copyText('${acc.password}', 'Password')" class="bg-emerald-50 text-emerald-600 font-semibold py-2 px-4 rounded-xl text-xs hover:bg-emerald-100 transition">🔑 Copy Password</button>
          </div>
        `;
        accountsList.appendChild(accCard);
      });
    }

    searchBar.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      renderAccounts(allAccounts.filter(acc => acc.email.toLowerCase().includes(term)));
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }
  </script>
</body>
</html>
