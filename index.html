    const nameData = {

      },
      us: {
        male: ["James Smith", "John Johnson", "Robert Williams", "Michael Brown", "David Jones", "William Garcia", "Richard Miller"],
        female: ["Mary Smith", "Patricia Johnson", "Jennifer Williams", "Linda Brown", "Elizabeth Jones", "Barbara Garcia"]
      },
      uk: {
        male: ["Oliver Davies", "George Evans", "Harry Taylor", "Noah Thomas", "Jack Roberts"],
        female: ["Olivia Davies", "Amelia Evans", "Isla Taylor", "Ava Thomas", "Mia Roberts"]
      },
      ca: {
        male: ["Liam Tremblay", "Jackson Roy", "Lucas Gagnon", "Noah Lee"],
        female: ["Emma Tremblay", "Olivia Roy", "Charlotte Gagnon", "Sophia Lee"]
      },
      au: {
        male: ["Oliver Smith", "Noah Jones", "Jack Williams", "William Brown"],
        female: ["Charlotte Smith", "Amelia Jones", "Isla Williams", "Olivia Brown"]
      },
      de: {
        male: ["Noah Müller", "Matteo Schmidt", "Leon Schneider", "Finn Fischer"],
        female: ["Mia Müller", "Emilia Schmidt", "Sophia Schneider", "Hannah Fischer"]
      }
    };

    const countrySelect = document.getElementById('country-select');
    const genderSelect = document.getElementById('gender-select');
    const genBtn = document.getElementById('gen-btn');
    const nameBox = document.getElementById('name-box');
    const generatedName = document.getElementById('generated-name');
    const nameMeta = document.getElementById('name-meta');
    const copyNameBtn = document.getElementById('copy-name-btn');
    const toast = document.getElementById('toast');

    function showToast(msg) {
      toast.innerText = msg;
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, 2500);
    }

    genBtn.addEventListener('click', () => {
      const country = countrySelect.value;
      const gender = genderSelect.value;
      const list = nameData[country][gender];
      const randomName = list[Math.floor(Math.random() * list.length)];

      generatedName.innerText = randomName;
      nameMeta.innerText = `${country.toUpperCase()} • ${gender}`;
      nameBox.classList.remove('hidden');
    });

    copyNameBtn.addEventListener('click', () => {
      const name = generatedName.innerText;
      if (name) {
        navigator.clipboard.writeText(name).then(() => {
          showToast('📋 Name Copied!');
        });
      }
    });

    // PWA Install Logic
    let deferredPrompt;
    const installBtn = document.getElementById('pwa-install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('User accepted the install prompt');
        }
        deferredPrompt = null;
        installBtn.classList.add('hidden');
      }
    });

    window.addEventListener('appinstalled', () => {
      installBtn.classList.add('hidden');
    });

    // Service Worker Registration for GitHub Pages
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('PWA SW Registered!', reg))
          .catch(err => console.log('SW Registration Failed:', err));
      });
    }
  </script>
